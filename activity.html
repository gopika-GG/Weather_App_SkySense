<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Best Activity Time</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>

    body {
  transition: background-image 1s ease-in-out;
  background-size: cover;
  background-position: center;
}

.bg-jogging {
  background-image: url('https://picsum.photos/id/1011/1200/800'); /* Jogging trail */
}

.bg-walking {
  background-image: url('https://picsum.photos/id/1021/1200/800'); /* Park walking */
}

.bg-picnic {
  background-image: url('https://picsum.photos/id/1035/1200/800'); /* Picnic field */
}

.bg-cycling {
  background-image: url('https://picsum.photos/id/1043/1200/800'); /* Cycling road */
}
    @keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.animated-result {
  animation: fadeIn 0.8s ease forwards;
}

.card:hover {
  transform: scale(1.02);
  transition: transform 0.3s ease;
}
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <!-- Brand -->
    <a class="navbar-brand" href="index.html">☀️ SkySense</a>

    <!-- Toggler for mobile -->
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
      aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Collapsible links -->
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
       
        <li class="nav-item"><a class="nav-link" href="index.html">🌤️ Weather</a></li>
        <li class="nav-item"><a class="nav-link" href="ClimateTrend.html">📈 Climate Trend</a></li>
        <li class="nav-item"><a class="nav-link" href="conversation.html">🗣️ Conversational Weather</a></li>
      </ul>
    </div>
  </div>
</nav>
      <div class="container mt-4">
    <div class="card p-4 shadow-lg">
      <h2 class="text-center mb-3">🌤️ Weather App</h2>

      <!-- City input -->
      <div class="mb-3">
        <input type="text" id="cityInput" class="form-control" placeholder="Enter city name">
      </div>

      <!-- Weather button -->
      <div class="d-grid mb-3">
        <button class="btn btn-primary" onclick="getWeatherforActivity()">Get Weather</button>
      </div>

      <!-- Current weather result -->
      <div id="weatherResult" class="text-center mb-3"></div>

      <!-- Forecast -->
      <h5 class="text-center text-secondary">5-Day Forecast</h5>
      <div id="forecast" class="row g-3 mt-2"></div>
      <hr>

      <!-- Best Activity Time -->
      <h5 class="text-center text-secondary">Best Activity Time</h5>
      <div class="row mb-3">
        <div class="col-md-6">
          <select id="activitySelect" class="form-control">
            <option value="Jogging">Jogging</option>
            <option value="Walking">Walking</option>
            <option value="Picnic">Picnic</option>
            <option value="Cycling">Cycling</option>
          </select>
        </div>
        <div class="col-md-6 d-grid">
          <button class="btn btn-info" onclick="findBestActivityTime()">Find Best Time</button>
        </div>
      </div>
      <div id="activityResult" class="text-center mt-3"></div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
