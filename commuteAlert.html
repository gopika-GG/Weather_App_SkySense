    <script>
  const apiKey = "41229cf61edd8e1021251c339a96e62c"; // replace with your API key

  async function fetchWeatherDataByCoords(lat, lon) {
    const url = `https://api.openweathermap.org/data/2.5/forecast?lat=${lat}&lon=${lon}&appid=${apiKey}&units=metric`;
    const response = await fetch(url);
    const data = await response.json();
    return data.list; // 3-hour forecast array
  }

  function personalizedCommuteAlert(forecastList, userCommuteTime = "18:00") {
    const commuteHour = parseInt(userCommuteTime.split(":")[0], 10);

    const forecast = forecastList.find(item => {
      const date = new Date(item.dt * 1000);
      return date.getHours() === commuteHour;
    }) || {};

    const condition = forecast.weather ? forecast.weather[0].main : "";
    const temp = forecast.main ? forecast.main.temp : 0;

    if (condition === "Rain") {
      return { msg: `🌧️ Rain expected at ${userCommuteTime} — carry an umbrella.`, cls: "alert alert-primary" };
    } else if (temp > 35) {
      return { msg: `🔥 High heat at ${userCommuteTime} — stay hydrated.`, cls: "alert alert-danger" };
    } else {
      return { msg: `✅ Weather looks fine for your commute at ${userCommuteTime}.`, cls: "alert alert-success" };
    }
  }

  async function showCommuteAlert(useLiveLocation = false) {
    const commuteTime = document.getElementById("commuteTime").value;

    try {
      let forecastList;

      if (useLiveLocation) {
        // Use browser geolocation
        navigator.geolocation.getCurrentPosition(async (position) => {
          const lat = position.coords.latitude;
          const lon = position.coords.longitude;

          forecastList = await fetchWeatherDataByCoords(lat, lon);
          const alertObj = personalizedCommuteAlert(forecastList, commuteTime);

          document.getElementById("app").style.display = "none";
          document.getElementById("commutePage").style.display = "block";

          const resultDiv = document.getElementById("commuteResult");
          resultDiv.className = alertObj.cls;
          resultDiv.innerText = alertObj.msg;
        }, () => {
          alert("Unable to fetch live location. Please allow location access or enter a city manually.");
        });
      } else {
        // Fallback: use city input
        const city = document.getElementById("city").value;
        if (!city) {
          alert("Please enter a city or enable live location.");
          return;
        }
        const url = `https://api.openweathermap.org/data/2.5/forecast?q=${city}&appid=${apiKey}&units=metric`;
        const response = await fetch(url);
        const data = await response.json();
        forecastList = data.list;

        const alertObj = personalizedCommuteAlert(forecastList, commuteTime);

        document.getElementById("app").style.display = "none";
        document.getElementById("commutePage").style.display = "block";

        const resultDiv = document.getElementById("commuteResult");
        resultDiv.className = alertObj.cls;
        resultDiv.innerText = alertObj.msg;
      }
    } catch (error) {
      alert("Error fetching weather data. Please check your API key or location access.");
    }
  }

  function goBack() {
    document.getElementById("commutePage").style.display = "none";
    document.getElementById("app").style.display = "block";
  }
</script>
