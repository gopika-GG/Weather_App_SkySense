// Auto Location Weather Fetch
function getWeatherByLocation() {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      (position) => {
        const lat = position.coords.latitude;
        const lon = position.coords.longitude;
        const apiKey = "41229cf61edd8e1021251c339a96e62c"; // Replace with your OpenWeatherMap API key
        const url = `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${apiKey}&units=metric`;

        fetch(url)
          .then(response => response.json())
          .then(data => {
            document.getElementById("convResult").innerText =
              `📍 Location: ${data.name}\n🌡️ Temp: ${data.main.temp}°C\n☁️ Condition: ${data.weather[0].description}`;
          })
          .catch(error => {
            document.getElementById("convResult").innerText = "⚠️ Error fetching weather.";
          });
      },
      (error) => {
        document.getElementById("convResult").innerText = "⚠️ Location access denied.";
      }
    );
  } else {
    document.getElementById("convResult").innerText = "❌ Geolocation not supported.";
  }
}
       // 🎤 Voice Input using Web Speech API
const forecastContext = `
Rain is expected at 6 PM in Thiruvananthapuram.
Tomorrow will be sunny with temperatures around 32°C,
making it a good day for outdoor activities.
`;

function conversationalWeather() {
  const query = document.getElementById("queryInput").value.trim().toLowerCase();
  let answer = "";

  if (query.includes("rain")) {
    answer = forecastContext.toLowerCase().includes("rain")
      ? "🌧️ Yes, rain is expected around 6 PM."
      : "☀️ No rain is mentioned in the forecast.";
  } else if (query.includes("sunny") || query.includes("beach")) {
    answer = forecastContext.toLowerCase().includes("sunny")
      ? "☀️ Yes, tomorrow looks sunny and good for outdoor plans."
      : "⚠️ Weather may not be suitable for outdoor plans.";
  } else if (query.includes("temperature") || query.includes("hot")) {
    answer = "🌡️ The forecast says around 32°C tomorrow.";
  } else {
    answer = "🤔 I couldn’t find a clear answer in the forecast.";
  }

  document.getElementById("convResult").innerText = answer;
  document.getElementById("queryInput").value = "";
}

// 🎤 Voice Input using Web Speech API
function startVoiceInput() {
  if (!('webkitSpeechRecognition' in window)) {
    alert("❌ Voice input not supported in this browser.");
    return;
  }

  const recognition = new webkitSpeechRecognition();
  recognition.lang = "en-IN"; // English (India)
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  recognition.start();

  recognition.onresult = (event) => {
    const transcript = event.results[0][0].transcript;
    document.getElementById("queryInput").value = transcript;
    conversationalWeather(); // auto run after voice input
  };

  recognition.onerror = (event) => {
    document.getElementById("convResult").innerText = "⚠️ Voice input error: " + event.error;
  };
}
